name: forward_2r_feedforward

simulation:
  T: 100.0
  dt: 0.1
  solver:
    method: RK45
    rtol: 1e-6
    atol: 1e-9

model:
  l: 2
  m: 1

inputs:
  names: [u0]
  u0:
    type: boxcar
    onsets: [10.0]
    durations: [20.0]
    amplitudes: 1.0
  
neuronal:
   # A is (2,2): negative self-connections (stable) + feedforward 1->2
  # Convention: z_dot = A z + C u, so A[1,0] couples region0 -> region1
  A:
    - [-0.5,  0.0]
    - [ 0.6, -0.5]
  # B is (m,l,l) = (1,2,2), set to zero (no modulation)
  B:
    - [[0.0, 0.0],
       [0.0, 0.0]]
  # C is (l,m) = (2,1): drive region 0 only
  C:
    - [1.0]
    - [0.0]

hemodynamic:
  use_defaults: true