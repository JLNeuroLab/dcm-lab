name: forward_1r_2inputs_events

simulation:
  T: 100.0
  dt: 0.1
  solver:
    method: RK45
    rtol: 1e-6
    atol: 1e-9

model:
  l: 1
  m: 2

inputs:
  names: [u0, u1]
  u0:
    type: events
    onsets: [10.0]
    amplitudes: 10.0
    mode: nearest
  u1:
    type: events
    onsets: [40.0, 42.0, 44.0, 46.0]
    amplitudes: 10.0
    mode: nearest

neuronal:
  A: [[-0.5]]
  B:
    - [[0.0]]
    - [[0.0]]
  C: [[1.0, 0.5]]

hemodynamic:
  use_defaults: true