name: sim_sanity

simulation:
  T: 100.0
  dt: 0.1
  solver:
    method: RK45
    rtol: 1e-6
    atol: 1e-9

model:
  l: 1
  m: 2

inputs:
  names: [u0, u1]
  u0:
    type: boxcar
    onsets: [10.0]
    durations: [20.0]
    amplitudes: 1.0
  u1:
    type: boxcar
    onsets: [40.0]
    durations: [30.0]
    amplitudes: 1.0

neuronal:
  A: [[-0.5]]
  B:
    - [[0.0]]
    - [[0.0]]
  C: [[1.0, 0.5]]

hemodynamic:
  use_defaults: true