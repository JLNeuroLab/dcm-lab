name: inversion_2r_feedforward

model:
  l: 2
  m: 1

simulation:
  T: 10.0
  dt: 0.1
  solver:
    method: RK45
    rtol: 1e-3
    atol: 1e-6

# ============================================================
# TRUE PARAMETERS (DATA GENERATION)
# ============================================================

true_model:
  neuronal:
    A:
      - [-0.5, 0.3]
      - [0.0, -0.5]
    B:
      - [[0.0, 0.0],
         [0.0, 0.0]]
    C:
      - [1.0]
      - [0.0]

  hemodynamic:
    use_defaults: true


# ============================================================
# INITIAL MODEL (INVERSION START)
# ============================================================

init_model:
  neuronal:
    A:
      - [-0.3, 0.1]
      - [0.1, -0.3]
    B:
      - [[0.0, 0.0],
         [0.0, 0.0]]
    C:
      - [0.5]
      - [0.0]

  hemodynamic:
    use_defaults: true


# ============================================================
# PRIORS (FOR MAP)
# ============================================================

priors:
  mu:
    A:
      - [0.0, 0.0]
      - [0.0, 0.0]
    B:
      - [[0.0, 0.0],
         [0.0, 0.0]]
    C:
      - [0.0]
      - [0.0]

  sigma:
    A: 0.5
    B: 0.5
    C: 0.5


# ============================================================
# NOISE MODEL
# ============================================================

noise:
  std: 0.02


# ============================================================
# OPTIMIZATION
# ============================================================

optimizer:
  method: lbfgs
  max_iter: 50


# ============================================================
# INPUT DESIGN
# ============================================================

inputs:
  names: [stim]

  stim:
    type: boxcar
    onsets: [2.0, 6.0, 9.0]
    durations: [0.5, 0.5, 0.5]
    amplitudes: 1.0


# ============================================================
# HEMODYNAMIC MODEL
# ============================================================

hemodynamic:
  use_defaults: true