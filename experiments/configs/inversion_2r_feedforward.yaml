name: inversion_2r_feedforward

model:
  l: 2       # number of regions
  m: 1       # number of inputs

simulation:
  T: 120
  dt: 0.2
  solver:
    method: RK45
    rtol: 1e-6
    atol: 1e-9

true_parameters:
  A:
    - [-0.5, 0.3]
    - [0.0, -0.5]
  B:
    - [[0.0, 0.0],
       [0.0, 0.0]]
  C:
    - [1.0]
    - [0.0]

initialization:
  A:
    - [-0.3, 0.1]
    - [0.1, -0.3]
  B:
    - [[0.0, 0.0],
       [0.0, 0.0]]
  C:
    - [0.5]
    - [0.0]

priors:
  mu:
    A:
      - [0.0, 0.0]
      - [0.0, 0.0]
    B:
      - [[0.0, 0.0],
         [0.0, 0.0]]
    C:
      - [0.0]
      - [0.0]
  sigma:
    A: 0.5
    B: 0.5
    C: 0.5

noise:
  std: 0.02

optimizer:
  method: L-BFGS-B
  maxiter: 200

inputs:
  names: [stim]
  stim:
    type: boxcar
    onsets: [20, 60, 90]
    durations: [5, 5, 5]
    amplitudes: 1.0

hemodynamic:
  use_defaults: true