name: inversion_2r_modulatory

# ============================================================
# MODEL DIMENSIONS
# ============================================================

model:
  l: 2
  m: 1

# ============================================================
# SIMULATION SETTINGS
# ============================================================

simulation:
  T: 20.0
  dt: 0.1

# ============================================================
# TRUE MODEL (DATA GENERATION)
# ============================================================

true_model:
  neuronal:
    A:
      - [-0.5, 0.2]
      - [0.0, -0.5]

    B:
      - [[0.0, 0.5],
         [0.0, 0.0]]

    C:
      - [1.0]
      - [0.2]

  hemodynamic:
    use_defaults: true

# ============================================================
# INITIAL MODEL (INFERENCE STARTING POINT)
# ============================================================

init_model:
  neuronal:
    A:
      - [-0.3, 0.1]
      - [0.0, -0.3]

    B:
      - [[0.0, 0.1],
         [0.0, 0.0]]

    C:
      - [0.5]
      - [0.1]

  hemodynamic:
    use_defaults: true

# ============================================================
# PRIORS (MAP ESTIMATION)
# ============================================================

priors:
  mu:
    A:
      - [0.0, 0.0]
      - [0.0, 0.0]

    B:
      - [[0.0, 0.0],
         [0.0, 0.0]]

    C:
      - [0.0]
      - [0.0]

  sigma:
    A: 0.1
    B: 0.1
    C: 0.1

# ============================================================
# NOISE MODEL
# ============================================================

noise:
  std: 0.03

# ============================================================
# DCM OPTIMIZATION (MAP)
# ============================================================

optimizer:
  method: lbfgs
  max_iter: 200
  lr: 0.01

# ============================================================
# HYBRID RESIDUAL LEARNING
# ============================================================

hybrid:
  alpha: 0.5          # strength residual dynamics
  lr: 0.001           # MLP learning rate
  epochs: 50         # training steps

# ============================================================
# INPUT DESIGN
# ============================================================

inputs:
  names: [stim]

  stim:
    type: boxcar
    onsets: [1.0, 3.0, 5.0, 14.0, 19.0]
    durations: [0.5, 0.5, 0.5, 0.5, 0.5]
    amplitudes: 1.0

# ============================================================
# HEMODYNAMIC MODEL
# ============================================================

hemodynamic:
  use_defaults: true

# ============================================================
# OUTPUT SETTINGS (OPTIONAL BUT USEFUL)
# ============================================================

logging:
  save_trace: true
  save_theta: true
  save_diagnostics: true